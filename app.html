<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonetto CTF Web 解题助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 左侧栏：显示下一步内容 -->
        <div class="panel left-panel">
            <h2 class="panel-title">Sonetto</h2>
            <div class="content-area">
                <div id="next-step-content" class="markdown-content">
                    加载中...
                </div>
                <div id="sonetto-info" class="sonetto-info">
                    <div class="model-selector">
                        <div class="model-selector-header" id="model-selector-header" title="底层模型">
                            <span id="current-model">加载中...</span>
                            <span class="dropdown-arrow">▼</span>
                        </div>
                        <div class="model-dropdown" id="model-dropdown">
                            <div class="model-option-loading">加载模型列表...</div>
                        </div>
                    </div>
                    <div class="token-indicator" title="当前token占用比例">
                        <span class="token-label">token</span>
                        <div class="token-ring-container">
                            <svg class="token-ring" viewBox="0 0 40 40">
                                <circle class="token-ring-bg" cx="20" cy="20" r="18" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="3"></circle>
                                <circle class="token-ring-fill" cx="20" cy="20" r="18" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="113" stroke-dashoffset="113" transform="rotate(-90 20 20)"></circle>
                            </svg>
                            <span class="token-percentage" id="token-ratio">0%</span>
                        </div>
                    </div>
                    <div class="mode-selector">
                        <div class="mode-selector-header" id="mode-selector-header" title="当前外骨骼出力模式">
                            <span id="current-mode">加载中...</span>
                            <span class="dropdown-arrow">▼</span>
                        </div>
                        <div class="mode-dropdown" id="mode-dropdown">
                            <div class="mode-option" data-mode="coach">Coach</div>
                            <div class="mode-option" data-mode="copilot">Copilot</div>
                            <div class="mode-option" data-mode="boost">Boost</div>
                            <div class="mode-option" data-mode="full_power">FULL-POWER</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧栏：输入区域 -->
        <div class="panel right-panel">
            <h2 class="panel-title">You</h2>
            <div class="content-area">
                <div id="input-sections">
                    加载中...
                </div>
                <!-- 加载状态 -->
                <div id="loading-status" class="loading-status" style="display: none;">
                    <div class="loading"></div>
                    <span>等待模型处理中...</span>
                </div>
                
                <!-- 按钮区域 -->
                <div class="button-container">
                    <button id="restart-btn" class="btn btn-secondary">重新开始</button>
                    <button id="next-btn" class="btn btn-primary">下一步</button>
                    <button id="exit-btn" class="btn btn-danger">结束</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 保存上次文件修改时间
        let lastModifiedTime = 0;
        
        // WebSocket相关变量
        let ws = null;
        let wsConnected = false;
        let wsReconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 5;
        const RECONNECT_DELAY = 3000;

        // 读取和解析 communication.md 文件
        async function loadCommunicationFile() {
            try {
                console.log('loadCommunicationFile 被调用');
                // 添加时间戳参数，确保每次请求都获取最新文件
                const timestamp = new Date().getTime();
                
                // 直接获取文件内容（不使用HEAD请求，避免文件时间戳问题）
                const response = await fetch(`communication.md?timestamp=${timestamp}`);
                if (!response.ok) {
                    throw new Error('无法读取文件');
                }
                
                const content = await response.text();
                console.log('文件内容长度:', content.length);
                console.log('文件内容预览:', content.substring(0, 200));
                
                // 更新页面内容
                parseCommunicationContent(content);
                
                // 检查是否有实际响应内容
                const hasActualResponse = content.trim().includes('### 下一步');
                const hasContent = content.trim().length > 50;
                
                console.log('加载状态判断 - hasActualResponse:', hasActualResponse, 'hasContent:', hasContent);
                
                // 只有检测到实际内容时，才隐藏加载状态
                if (hasActualResponse && hasContent) {
                    console.log('检测到文件内容，隐藏加载状态');
                    document.getElementById('loading-status').style.display = 'none';
                }
                
                // 更新修改时间
                lastModifiedTime = Date.now();
                
                console.log('文件内容已处理');
            } catch (error) {
                console.error('加载文件错误:', error);
                // 如果文件不存在，尝试创建文件
                if (error.message.includes('404') || error.message.includes('无法读取文件')) {
                    console.log('communication.md 文件不存在，尝试创建...');
                    await createCommunicationFile();
                    // 重新尝试加载文件
                    await loadCommunicationFile();
                } else {
                    document.getElementById('next-step-content').textContent = '错误：无法加载 communication.md 文件';
                    document.getElementById('input-sections').textContent = '请确保 communication.md 文件存在';
                }
            }
        }

        function renderMarkdown(text) {
            if (!text) return '';

            const codeBlocks = [];
            const placeholder = (i) => `\uE000CODE${i}\uE001`;
            const placeholderRe = /\uE000CODE(\d+)\uE001/g;

            // ── 1. 先保护代码 ──────────────────────────────────────────────
            text = text.replace(/```([\w]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
                const i = codeBlocks.length;
                const safe = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                const cls = lang ? ` class="language-${lang}"` : '';
                codeBlocks.push(`<pre style="background:rgba(0,0,0,0.05);padding:10px;border-radius:5px;overflow-x:auto;margin:10px 0"><code${cls}>${safe}</code></pre>`);
                return placeholder(i);
            });
            text = text.replace(/`([^`\n]+)`/g, (_, code) => {
                const i = codeBlocks.length;
                const safe = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                codeBlocks.push(`<code style="background:rgba(0,0,0,0.05);padding:2px 4px;border-radius:3px">${safe}</code>`);
                return placeholder(i);
            });

            // ── 2. 块级结构（标题、列表、引用、分割线）─────────────────────
            text = text.replace(/^#{6} (.*$)/gm, '<h6>$1</h6>');
            text = text.replace(/^#{5} (.*$)/gm, '<h5>$1</h5>');
            text = text.replace(/^#{4} (.*$)/gm, '<h4>$1</h4>');
            text = text.replace(/^#{3} (.*$)/gm, '<h3>$1</h3>');
            text = text.replace(/^#{2} (.*$)/gm, '<h2>$1</h2>');
            text = text.replace(/^#{1} (.*$)/gm,  '<h1>$1</h1>');

            text = text.replace(/^-{3,}$/gm, '<hr style="border:none;border-top:1px solid rgba(0,0,0,0.2);margin:20px 0">');

            text = text.replace(/^> (.*$)/gm,
                '<blockquote style="border-left:3px solid rgba(0,0,0,0.2);padding-left:10px;margin:10px 0">$1</blockquote>');

            text = text.replace(/((?:^[*\-+] .*$\n?)+)/gm, block => {
                const items = block.trim().replace(/^[*\-+] (.*$)/gm, '<li>$1</li>');
                return `<ul>${items}</ul>`;
            });
            text = text.replace(/((?:^\d+\. .*$\n?)+)/gm, block => {
                const items = block.trim().replace(/^\d+\. (.*$)/gm, '<li>$1</li>');
                return `<ol>${items}</ol>`;
            });

            // ── 3. 段落包裹 ────────────────────────────────────────────────
            const blockTags = /^<(h[1-6]|ul|ol|li|blockquote|pre|hr|img)/;
            text = text.split('\n').map(line =>
                (line.trim() === '' || blockTags.test(line.trim())) ? line : `<p>${line}</p>`
            ).join('\n');
            text = text.replace(/<p>\s*<\/p>/g, '');

            // ── 4. ★ 内联样式最后处理，此时所有块级 HTML 已就位 ────────────
            //    只处理标签内部的文本节点，不破坏 HTML 属性里的内容
            const applyInline = (html) => {
                // 用占位符保护 HTML 标签本身，只对标签之间的文本做内联替换
                const tags = [];
                const tagPlaceholder = (i) => `\uE002TAG${i}\uE003`;
                html = html.replace(/<[^>]+>/g, m => {
                    const i = tags.length;
                    tags.push(m);
                    return tagPlaceholder(i);
                });

                // 图片先于链接
                html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,
                    '<img src="$2" alt="$1" style="max-width:100%;height:auto;margin:10px 0">');
                html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
                    '<a href="$2" target="_blank">$1</a>');

                html = html.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
                html = html.replace(/\*\*(.*?)\*\*/g,     '<strong>$1</strong>');
                html = html.replace(/__(.*?)__/g,          '<strong>$1</strong>');
                html = html.replace(/\*(.*?)\*/g,          '<em>$1</em>');
                html = html.replace(/_(.*?)_/g,            '<em>$1</em>');

                // 还原 HTML 标签
                html = html.replace(/\uE002TAG(\d+)\uE003/g, (_, i) => tags[+i]);
                return html;
            };

            text = applyInline(text);

            // ── 5. 还原代码占位符 ──────────────────────────────────────────
            text = text.replace(placeholderRe, (_, i) => codeBlocks[+i]);

            return text;
        }

        // 解析 communication.md 内容
        function parseCommunicationContent(content) {
            console.log('开始解析 communication.md 内容，长度:', content.length);
            
            // 保存用户输入的内容
            const userInputs = {};
            const existingTextareas = document.querySelectorAll('.input-textarea');
            existingTextareas.forEach(textarea => {
                userInputs[textarea.id] = textarea.value;
            });
            
            // 分割内容，找到所有三级标题
            const sections = content.split('### ');
            console.log('分割后的 sections 数量:', sections.length);
            
            // 找到"下一步"部分
            let nextStepContent = '';
            let foundNextStep = false;
            const inputSections = [];

            for (const section of sections) {
                console.log('处理 section:', section.substring(0, 50));
                if (section.startsWith('下一步')) {
                    // 提取"下一步"内容
                    nextStepContent = section.substring(3).trim();
                    foundNextStep = true;
                    console.log('找到"下一步"部分，内容长度:', nextStepContent.length);
                } else if (foundNextStep && section.trim()) {
                    // 提取后续的三级标题及其内容
                    const lines = section.split('\n');
                    const title = lines[0].trim();
                    console.log('找到输入部分:', title);
                    inputSections.push(title);
                }
            }

            // 显示"下一步"内容（使用 Markdown 渲染）
            const renderedContent = renderMarkdown(nextStepContent);
            const nextStepElement = document.getElementById('next-step-content');
            if (nextStepElement) {
                nextStepElement.innerHTML = renderedContent;
                console.log('next-step-content 已更新，渲染后长度:', renderedContent.length);
            } else {
                console.error('找不到 next-step-content 元素');
            }

            // 生成输入区域
            const inputSectionsContainer = document.getElementById('input-sections');
            if (inputSectionsContainer) {
                inputSectionsContainer.innerHTML = '';
                
                if (inputSections.length === 0) {
                    inputSectionsContainer.innerHTML = '<p>请等待 - 模型即将就绪</p>';
                    console.log('没有输入部分，显示等待提示');
                } else {
                    inputSections.forEach(title => {
                        const sectionDiv = document.createElement('div');
                        sectionDiv.className = 'input-section';
                        
                        const label = document.createElement('label');
                        label.className = 'input-label';
                        label.textContent = title;
                        
                        const textarea = document.createElement('textarea');
                        textarea.className = 'input-textarea';
                        const textareaId = `input-${title.toLowerCase().replace(/\s+/g, '-')}`;
                        textarea.id = textareaId;
                        
                        // 恢复用户输入的内容
                        if (userInputs[textareaId]) {
                            textarea.value = userInputs[textareaId];
                        }
                        
                        sectionDiv.appendChild(label);
                        sectionDiv.appendChild(textarea);
                        inputSectionsContainer.appendChild(sectionDiv);
                    });
                    console.log('输入区域已更新，共', inputSections.length, '个输入框');
                }
            } else {
                console.error('找不到 input-sections 元素');
            }
        }

        // 创建communication.md文件
        async function createCommunicationFile() {
            try {
                // 创建初始内容
                const initialContent = `# CTF Web 解题助手 - 会话开始

## 欢迎使用 Sonetto CTF Web 解题助手

### 下一步
请点击"下一步"按钮开始解题过程。

### 用户输入
在这里输入你的解题思路或问题。

---
*会话已开始，请按照提示进行操作。*`;
                
                // 使用PUT请求创建文件
                const response = await fetch('communication.md', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'text/plain; charset=utf-8'
                    },
                    body: initialContent
                });
                
                if (!response.ok) {
                    throw new Error('无法创建文件');
                }
                
                console.log('communication.md文件创建成功');
            } catch (error) {
                console.error('创建文件错误:', error);
                throw error;
            }
        }

        // 加载Sonetto信息
        async function loadSonettoInfo() {
            try {
                console.log('开始加载Sonetto信息');
                // 读取config.json文件
                const timestamp = new Date().getTime();
                console.log('请求config.json文件');
                const response = await fetch(`config.json?timestamp=${timestamp}`);
                console.log('config.json响应状态:', response.status);
                if (!response.ok) {
                    throw new Error('无法读取config.json文件，状态码: ' + response.status);
                }
                
                console.log('开始解析config.json');
                const config = await response.json();
                console.log('解析结果:', config);
                const currentMode = config.mode || 'unknown';
                console.log('当前模式:', currentMode);
                
                // 更新模式显示
                const modeElement = document.getElementById('current-mode');
                console.log('模式元素:', modeElement);
                if (modeElement) {
                    modeElement.textContent = currentMode;
                    console.log('模式显示已更新');
                } else {
                    console.error('找不到current-mode元素');
                }
                
                console.log('Sonetto信息已更新，当前模式:', currentMode);
            } catch (error) {
                console.error('加载Sonetto信息错误:', error);
                const modeElement = document.getElementById('current-mode');
                if (modeElement) {
                    modeElement.textContent = '错误';
                }
            }
        }

        // 初始化WebSocket连接
        function initWebSocket() {
            console.log('初始化WebSocket连接...');
            try {
                ws = new WebSocket('ws://localhost:8766');
                
                ws.onopen = function() {
                    console.log('WebSocket连接已建立');
                    wsConnected = true;
                    wsReconnectAttempts = 0;
                    // 更新连接状态显示
                    updateConnectionStatus('WebSocket连接已建立');
                    // 重新获取模型列表
                    console.log('WebSocket连接成功，重新获取模型列表');
                    getModels();
                };
                
                ws.onmessage = function(event) {
                    handleWebSocketMessage(event);
                };
                
                ws.onerror = function(error) {
                    console.error('WebSocket连接错误:', error);
                    wsConnected = false;
                    updateConnectionStatus('WebSocket连接错误');
                };
                
                ws.onclose = function() {
                    console.log('WebSocket连接已关闭');
                    wsConnected = false;
                    updateConnectionStatus('WebSocket连接已关闭');
                    // 尝试重新连接
                    if (wsReconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                        wsReconnectAttempts++;
                        console.log(`尝试重新连接 (${wsReconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})...`);
                        setTimeout(initWebSocket, RECONNECT_DELAY);
                    } else {
                        console.log('达到最大重连次数，停止尝试');
                        updateConnectionStatus('WebSocket连接失败，已切换到文件轮询模式');
                    }
                };
            } catch (error) {
                console.error('初始化WebSocket时出错:', error);
                wsConnected = false;
                updateConnectionStatus('WebSocket初始化失败，已切换到文件轮询模式');
            }
        }
        
        // 处理 WebSocket 消息
        function handleWebSocketMessage(event) {
            console.log('收到 WebSocket 原始消息:', event.data);
            try {
                const data = JSON.parse(event.data);
                const messageType = data.type;
                const messageData = data.data;
                
                console.log('解析后的 WebSocket 消息:', messageType, messageData);
                
                // 根据消息类型处理
                switch (messageType) {
                    case 'next_step':
                        console.log('处理 next_step 消息，messageData:', messageData);
                        // 处理下一步响应 - 不立即隐藏加载状态，等待文件轮询检测到内容后自动隐藏
                        // 这样可以确保内容和加载状态同步
                        console.log('WebSocket 响应已收到，等待文件轮询更新内容');
                        break;
                    case 'restart':
                        console.log('处理 restart 消息');
                        // 处理重新开始响应 - 同样等待文件轮询
                        console.log('WebSocket 响应已收到，等待文件轮询更新内容');
                        break;
                    case 'exit':
                        // 处理结束响应
                        alert('会话结束指令已发送，请等待writeup生成');
                        break;
                    case 'custom_function':
                        // 处理自定义函数响应
                        showFunctionResult(messageData.result);
                        break;
                    case 'switch_mode':
                        // 处理模型模式切换响应
                        document.getElementById('loading-status').style.display = 'none';
                        // 更新当前模式显示
                        document.getElementById('current-mode').textContent = messageData.mode;
                        // 重新加载Sonetto信息
                        loadSonettoInfo();
                        console.log('模型模式切换成功:', messageData.message);
                        break;
                    case 'get_models':
                        // 处理获取模型列表响应
                        handleGetModelsResponse(messageData);
                        break;
                    case 'switch_model':
                        // 处理模型切换响应
                        document.getElementById('loading-status').style.display = 'none';
                        // 更新当前模型显示
                        document.getElementById('current-model').textContent = messageData.model;
                        console.log('模型切换成功:', messageData.message);
                        break;
                    case 'error':
                        // 处理错误响应
                        console.error('WebSocket错误:', messageData.message);
                        alert(`错误: ${messageData.message}`);
                        document.getElementById('loading-status').style.display = 'none';
                        break;
                    default:
                        console.log('未知的消息类型:', messageType);
                }
                
                // 更新token占用比例
                if (messageData.token_ratio !== undefined) {
                    const tokenRatioElement = document.getElementById('token-ratio');
                    const tokenRingFill = document.querySelector('.token-ring-fill');
                    if (tokenRatioElement && tokenRingFill) {
                        const percentage = Math.round(messageData.token_ratio * 100);
                        tokenRatioElement.textContent = `${percentage}%`;
                        
                        // 更新圆环进度
                        const circumference = 113; // 2 * π * 18
                        const offset = circumference - (messageData.token_ratio * circumference);
                        tokenRingFill.style.strokeDashoffset = offset;
                        
                        console.log('Token占用比例更新:', percentage, '%');
                    }
                }
            } catch (error) {
                console.error('处理WebSocket消息时出错:', error);
            }
        }
        
        // 更新连接状态显示
        function updateConnectionStatus(status) {
            console.log('连接状态:', status);
            // 可以在这里添加状态显示逻辑
        }
        
        // 显示函数执行结果
        function showFunctionResult(result) {
            // 显示函数执行结果
            let resultText = '';
            if (result.error) {
                resultText = `错误: ${result.error}`;
            } else if (result.analysis) {
                resultText = result.analysis;
            } else if (result.vulnerabilities) {
                resultText = `漏洞扫描结果:\n${result.vulnerabilities.map(v => `${v.type} (${v.severity}): ${v.description}`).join('\n')}`;
            } else if (result.payload) {
                resultText = `生成的Payload:\n${result.payload}`;
            }
            
            if (resultText) {
                alert(resultText);
            }
        }
        
        // 初始化模式选择器
        function initModeSelector() {
            const header = document.getElementById('mode-selector-header');
            const dropdown = document.getElementById('mode-dropdown');
            const arrow = header.querySelector('.dropdown-arrow');
            const options = dropdown.querySelectorAll('.mode-option');
            
            // 点击头部展开/收起下拉菜单
            header.addEventListener('click', function() {
                dropdown.classList.toggle('show');
                arrow.classList.toggle('rotate');
            });
            
            // 点击选项切换模式
            options.forEach(option => {
                option.addEventListener('click', function() {
                    const mode = this.getAttribute('data-mode');
                    switchMode(mode);
                    
                    // 关闭下拉菜单
                    dropdown.classList.remove('show');
                    arrow.classList.remove('rotate');
                });
            });
            
            // 点击页面其他地方关闭下拉菜单
            document.addEventListener('click', function(event) {
                if (!header.contains(event.target)) {
                    dropdown.classList.remove('show');
                    arrow.classList.remove('rotate');
                }
            });
        }
        
        // 切换模型模式
        function switchMode(mode) {
            console.log(`切换模型模式为: ${mode}`);
            
            // 显示加载状态
            document.getElementById('loading-status').style.display = 'flex';
            
            // 优先使用WebSocket
            if (sendButtonClick('switch_mode', { mode: mode })) {
                // WebSocket发送成功，等待响应
            } else {
                // WebSocket不可用，使用文件方式（这里简化处理，实际项目中可能需要更复杂的逻辑）
                alert('WebSocket未连接，无法切换模型模式');
                document.getElementById('loading-status').style.display = 'none';
            }
        }
        
        // 初始化模型选择器
        function initModelSelector() {
            const header = document.getElementById('model-selector-header');
            const dropdown = document.getElementById('model-dropdown');
            const arrow = header.querySelector('.dropdown-arrow');
            
            if (!header || !dropdown || !arrow) {
                console.error('找不到模型选择器的DOM元素');
                return;
            }
            
            console.log('初始化模型选择器');
            
            // 点击头部展开/收起下拉菜单
            header.addEventListener('click', function() {
                console.log('点击模型选择器头部');
                dropdown.classList.toggle('show');
                arrow.classList.toggle('rotate');
            });
            
            // 点击页面其他地方关闭下拉菜单
            document.addEventListener('click', function(event) {
                if (!header.contains(event.target)) {
                    dropdown.classList.remove('show');
                    arrow.classList.remove('rotate');
                }
            });
            
            // 首次加载模型列表 - 先显示默认列表，等待WebSocket连接后更新
            handleGetModelsResponse({
                models: ['deepseek-chat', 'deepseek-coder', 'deepseek-reasoner'],
                current_model: 'deepseek-chat'
            });
        }
        
        // 获取模型列表
        function getModels() {
            console.log('获取模型列表');
            const dropdown = document.getElementById('model-dropdown');
            dropdown.innerHTML = '<div class="model-option-loading">加载模型列表...</div>';
            
            // 优先使用WebSocket
            if (!sendButtonClick('get_models')) {
                // WebSocket不可用，显示默认模型
                handleGetModelsResponse({
                    models: ['deepseek-chat'],
                    current_model: 'deepseek-chat'
                });
            }
        }
        
        // 处理获取模型列表响应
        function handleGetModelsResponse(data) {
            console.log('收到模型列表:', data);
            console.log('data.models:', data.models);
            console.log('data.current_model:', data.current_model);
            
            const dropdown = document.getElementById('model-dropdown');
            const currentModelElement = document.getElementById('current-model');
            
            if (!dropdown) {
                console.error('找不到 model-dropdown 元素');
                return;
            }
            
            // 更新当前模型显示
            if (data.current_model) {
                currentModelElement.textContent = data.current_model;
                console.log('当前模型显示已更新为:', data.current_model);
            }
            
            // 清空下拉菜单
            dropdown.innerHTML = '';
            console.log('下拉菜单已清空');
            
            // 添加模型选项
            if (data.models && data.models.length > 0) {
                console.log('开始添加模型选项，共', data.models.length, '个');
                data.models.forEach((model, index) => {
                    console.log(`添加模型 ${index + 1}:`, model);
                    const option = document.createElement('div');
                    option.className = 'model-option';
                    option.dataset.model = model;
                    option.textContent = model;
                    
                    if (model === data.current_model) {
                        option.classList.add('selected');
                        console.log('标记为选中:', model);
                    }
                    
                    option.addEventListener('click', function() {
                        const selectedModel = this.getAttribute('data-model');
                        console.log('点击模型选项:', selectedModel);
                        switchModel(selectedModel);
                        
                        // 关闭下拉菜单
                        dropdown.classList.remove('show');
                        const arrow = document.getElementById('model-selector-header').querySelector('.dropdown-arrow');
                        arrow.classList.remove('rotate');
                    });
                    
                    dropdown.appendChild(option);
                });
                console.log('所有模型选项已添加');
            } else {
                console.error('无可用模型');
                dropdown.innerHTML = '<div class="model-option-error">无可用模型</div>';
            }
        }
        
        // 切换模型
        function switchModel(model) {
            console.log(`切换模型为: ${model}`);
            
            // 显示加载状态
            document.getElementById('loading-status').style.display = 'flex';
            
            // 优先使用WebSocket
            if (sendButtonClick('switch_model', { model: model })) {
                // WebSocket发送成功，等待响应
            } else {
                // WebSocket不可用
                alert('WebSocket未连接，无法切换模型');
                document.getElementById('loading-status').style.display = 'none';
            }
        }
        
        // 初始化
        window.onload = function() {
            // 首次加载时，强制刷新文件内容
            console.log('页面加载完成，开始加载communication.md文件');
            
            // 加载Sonetto信息
            setTimeout(loadSonettoInfo, 100); // 延迟执行，确保DOM元素已加载
            
            // 初始化WebSocket连接
            initWebSocket();
            
            // 初始化模型选择器
            initModelSelector();
            
            // 初始化模式选择器
            initModeSelector();
            
            // 立即加载文件
            loadCommunicationFile();
            
            // 定期检查文件更新
            setInterval(loadCommunicationFile, 5000); // 每5秒检查一次
        };

        // 发送按钮点击事件通过WebSocket
        function sendButtonClick(type, data = {}) {
            if (wsConnected && ws.readyState === WebSocket.OPEN) {
                console.log(`通过WebSocket发送${type}请求`);
                const message = {
                    type: type,
                    ...data
                };
                ws.send(JSON.stringify(message));
                return true;
            } else {
                console.log(`WebSocket未连接，使用文件方式发送${type}请求`);
                return false;
            }
        }
        
        // 下一步按钮点击事件
        document.getElementById('next-btn').addEventListener('click', function() {
            // 收集所有输入内容
            const inputElements = document.querySelectorAll('.input-textarea');
            const inputs = {};
            
            inputElements.forEach(element => {
                const id = element.id;
                const value = element.value;
                inputs[id] = value;
            });
            
            // 构建输入内容
            let inputContent = '';
            const labels = {};
            inputElements.forEach(element => {
                const label = element.previousElementSibling.textContent;
                const value = element.value;
                inputContent += `### ${label}\n${value}\n\n`;
                labels[label] = value;
            });
            
            // 清空所有输入框
            inputElements.forEach(element => {
                element.value = '';
            });
            
            // 显示等待状态
            document.getElementById('loading-status').style.display = 'flex';
            
            // 优先使用WebSocket
            if (sendButtonClick('next_step', { inputs: labels })) {
                // WebSocket发送成功，等待响应
            } else {
                // WebSocket不可用，使用文件方式
                fetch('communication.md', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'text/plain'
                    },
                    body: inputContent
                })
                .then(response => {
                    if (response.ok) {
                        console.log('输入内容已写入communication.md');
                        // 移除alert，等待状态已经显示
                    } else {
                        console.error('写入文件失败:', response.status);
                        alert('写入文件失败，请手动将输入内容复制到后端终端');
                        // 隐藏等待状态
                        document.getElementById('loading-status').style.display = 'none';
                    }
                })
                .catch(error => {
                    console.error('写入文件时发生错误:', error);
                    alert('写入文件时发生错误，请手动将输入内容复制到后端终端');
                    // 隐藏等待状态
                    document.getElementById('loading-status').style.display = 'none';
                });
            }
        });

        // 结束按钮点击事件
        document.getElementById('exit-btn').addEventListener('click', function() {
            if (confirm('确定要结束会话吗？')) {
                // 优先使用WebSocket
                if (sendButtonClick('exit')) {
                    // WebSocket发送成功，等待响应
                } else {
                    // WebSocket不可用，使用文件方式
                    fetch('communication.md', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'text/plain'
                        },
                        body: '### 退出标记\nEXIT_SESSION\n'
                    })
                    .then(response => {
                        if (response.ok) {
                            console.log('退出标记已写入communication.md');
                            alert('会话结束指令已发送，请等待writeup生成');
                        } else {
                            console.error('写入文件失败:', response.status);
                            alert('写入文件失败，请手动在终端输入"退出"');
                        }
                    })
                    .catch(error => {
                        console.error('写入文件时发生错误:', error);
                        alert('写入文件时发生错误，请手动在终端输入"退出"');
                    });
                }
            }
        });

        // 重新开始按钮点击事件
        document.getElementById('restart-btn').addEventListener('click', function() {
            if (confirm('确定要重新开始会话吗？')) {
                // 显示等待状态
                document.getElementById('loading-status').style.display = 'flex';
                
                // 优先使用WebSocket
                if (sendButtonClick('restart')) {
                    // WebSocket发送成功，等待响应
                } else {
                    // WebSocket不可用，使用文件方式
                    fetch('communication.md', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'text/plain'
                        },
                        body: '### 重新开始标记\nRESTART_SESSION\n'
                    })
                    .then(response => {
                        if (response.ok) {
                            console.log('重新开始标记已写入communication.md');
                            // 移除alert，等待状态已经显示
                            // 重新加载页面内容
                            setTimeout(loadCommunicationFile, 1000);
                        } else {
                            console.error('写入文件失败:', response.status);
                            alert('写入文件失败，请手动在终端重新启动程序');
                            // 隐藏等待状态
                            document.getElementById('loading-status').style.display = 'none';
                        }
                    })
                    .catch(error => {
                        console.error('写入文件时发生错误:', error);
                        alert('写入文件时发生错误，请手动在终端重新启动程序');
                        // 隐藏等待状态
                        document.getElementById('loading-status').style.display = 'none';
                    });
                }
            }
        });
    </script>
</body>
</html>
